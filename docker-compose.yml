services:
  private-rules:
    image: cyclince/private-rules:latest
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      RULE_TOKEN: ${RULE_TOKEN:?Set RULE_TOKEN in .env}
      TRUST_PROXY: "true"
    volumes:
      - private-rules-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  private-rules-data:
