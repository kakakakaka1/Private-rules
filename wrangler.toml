name = "private-rules"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
# 升级部署时保留在 Cloudflare Dashboard 中维护的变量。
# 密钥仍应通过 Variables and Secrets 或 `wrangler secret put` 管理，切勿写入本文件。
keep_vars = true

[assets]
directory = "./dist/client"
binding = "ASSETS"
# 让 /admin/login、/rules/* 等动态路由先由 Worker 处理；其余请求再回退到静态资源。
run_worker_first = true

[triggers]
crons = ["*/5 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "private-rules-db"
# 留空资源 ID，让 Cloudflare Workers Builds 在首次部署时自动创建 D1。
# 创建后的数据库会显示在 Cloudflare Dashboard，绑定名始终为 DB。
