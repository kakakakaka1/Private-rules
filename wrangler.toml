name = "private-rules-worker"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
# 留空资源 ID，让 Cloudflare Workers Builds 在首次部署时自动创建 D1。
# 创建后的数据库会显示在 Cloudflare Dashboard，绑定名始终为 DB。
