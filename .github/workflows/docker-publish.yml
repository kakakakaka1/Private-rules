name: Publish Docker image

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

concurrency:
  group: docker-publish
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Cyclince/Private_rules'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must use MAJOR.MINOR.PATCH" >&2
            exit 1
          fi
          {
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            cyclince/private-rules:${{ steps.version.outputs.version }}
            cyclince/private-rules:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Update Docker Hub Repository overview
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: cyclince/private-rules
          short-description: Private self-hosted rules console for Cloudflare Workers and Docker Compose.
          readme-filepath: ./docs/dockerhub/README.md
          enable-url-completion: true
